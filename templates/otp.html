<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; line-height: 1.6; color: #333; margin: 0; padding: 0; }
        .container { max-width: 600px; margin: 20px auto; padding: 20px; border: 1px solid #e1e1e1; border-radius: 10px; }
        .header { text-align: center; padding-bottom: 20px; border-bottom: 1px solid #eee; }
        .content { padding: 30px 0; text-align: center; }
        .otp-code { font-size: 32px; font-weight: bold; color: #2d89ef; letter-spacing: 5px; margin: 20px 0; padding: 10px; background: #f0f7ff; border-radius: 5px; display: inline-block; }
        .footer { font-size: 12px; color: #888; text-align: center; padding-top: 20px; border-top: 1px solid #eee; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h2>Xác thực tài khoản</h2>
        </div>
        <div class="content">
            <p>Xin chào,</p>
            <p>Mã xác thực (OTP) của bạn là:</p>
            <div class="otp-code">{{.OTP}}</div>
            <p>Mã này sẽ hết hạn trong <strong>{{.Expiry}} phút</strong>. Vui lòng không chia sẻ mã này với bất kỳ ai.</p>
        </div>
        <div class="footer">
            <p>Đây là email tự động, vui lòng không phản hồi.</p>
            <p>&copy; 2026 Expense Manager. All rights reserved.</p>
        </div>
    </div>
</body>
</html>
