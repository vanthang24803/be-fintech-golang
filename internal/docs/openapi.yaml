  /devices/biometric/enroll/{id}/begin:
    post:
      tags: [Devices]
      summary: Begin FIDO2 biometric enrollment for a device
      description: |
        Returns a `PublicKeyCredentialCreationOptions` challenge.
        Pass the result directly to `navigator.credentials.create()`.
      parameters:
        - $ref: "#/components/parameters/ResourceID"
      responses:
        "200":
          description: Enrollment challenge issued
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - type: object
                    properties:
                      data:
                        type: object
                        description: WebAuthn PublicKeyCredentialCreationOptions
        "404":
          $ref: "#/components/responses/NotFound"

  /devices/biometric/enroll/{id}/finish:
    post:
      tags: [Devices]
      summary: Finish FIDO2 biometric enrollment
      description: |
        Submit the raw `PublicKeyCredential` JSON from `navigator.credentials.create()`.
        On success the device record is updated with the enrolled credential.
      parameters:
        - $ref: "#/components/parameters/ResourceID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              description: Raw PublicKeyCredential JSON from navigator.credentials.create()
              properties:
                id:
                  type: string
                rawId:
                  type: string
                response:
                  type: object
                  properties:
                    attestationObject:
                      type: string
                    clientDataJSON:
                      type: string
                type:
                  type: string
                  example: public-key
      responses:
        "201":
          description: Biometric enrolled
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/Device"
        "400":
          description: Challenge expired or verification failed
